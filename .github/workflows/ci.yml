name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: nix flake check
        # Runs the format + actionlint + pytest suite that the flake declares
        # under `checks`. This is the same gate developers run locally.
        run: nix flake check --print-build-logs
