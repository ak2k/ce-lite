name: publish-dist

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream CE tag to convert (e.g., v3.4.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need full history so extract.lite_suffix_from_git can count
          # converter-touching commits since the last .last-processed bump.
          # Shallow (default depth=1) makes git rev-list return 0 and we
          # silently fall back to bare '-lite' suffix.
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Checkout upstream CE
        uses: actions/checkout@v6
        with:
          repository: EveryInc/compound-engineering-plugin
          ref: ${{ inputs.upstream_tag }}
          path: upstream-checkout

      - name: Stage dist/ output
        run: |
          rm -rf dist-staged
          mkdir -p dist-staged

      - name: Run unit tests
        run: nix develop --command python -m pytest tests/ -v

      - name: Run converter pipeline
        run: |
          nix develop --command python converter/extract.py upstream-checkout dist-staged "${{ inputs.upstream_tag }}"
          nix develop --command python converter/rewrite.py dist-staged
          nix develop --command python converter/generate_wrappers.py dist-staged
          nix develop --command python converter/generate_commands.py dist-staged
          nix develop --command python converter/validate.py dist-staged --upstream upstream-checkout

      - name: Apply staged dist/
        run: |
          rm -rf dist
          mv dist-staged dist
          echo "${{ inputs.upstream_tag }}" > .last-processed

      - name: Mint ak2k-ci App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}

      - name: Open PR
        uses: peter-evans/create-pull-request@v8
        with:
          # Open the PR as the ak2k-ci App, NOT the default GITHUB_TOKEN.
          # GITHUB_TOKEN-opened PRs emit no events, so ci.yml never ran on
          # the auto-PR and auto-merge-publish-dist never fired. An App-token
          # PR fires pull_request -> ci runs -> auto-merge merges when green.
          token: ${{ steps.app-token.outputs.token }}
          branch: ce-lite/upstream-${{ inputs.upstream_tag }}
          title: "chore: convert CE ${{ inputs.upstream_tag }}"
          commit-message: "chore: convert CE ${{ inputs.upstream_tag }}"
          body: |
            Automated conversion of upstream CE @ `${{ inputs.upstream_tag }}`.

            All deterministic conversion stages passed:
            - extract.py
            - rewrite.py
            - generate_wrappers.py
            - generate_commands.py
            - validate.py
            - nix flake check on dist-staged

            Reviewer: eyeball `dist/` diff, merge if structurally sane.
          add-paths: |
            dist/
            .last-processed
