    reply summaries.
ce-previous-comments-reviewer:
  _rationale: Targets iterative PR review cycles where prior feedback may have been
    dropped, partially addressed, or accidentally reverted in subsequent commits.
  keywords:
  - prior review comments
  - previous feedback
  - unresolved comments
  - review threads
  - unaddressed comments
  - follow-up review
  - feedback addressed
  - prior feedback
  - review comments resolved
  phrasing: Iterative-review PR context detected. Consider `/ce-lite:ce-previous-comments-reviewer`
