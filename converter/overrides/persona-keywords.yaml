  keywords:
  - Figma
  - pixel-perfect
  - design fidelity
  - design tokens
  - visual regression
  - design discrepancy
  - Figma handoff
  - responsive breakpoint
  - matches the design
  - design spec
  phrasing: Design-comparison prompt detected. Consider `/ce-lite:ce-design-implementation-reviewer`
    for pixel-perfect Figma vs. live UI comparison — spacing, typography, colors &
    responsive fidelity.
ce-design-iterator:
  _rationale: These keywords target precise UI/UX design-refinement vocabulary (visual
