    senior product leader.
ce-project-standards-reviewer:
  _rationale: Keywords target the narrow vocabulary of project-standards work — CLAUDE.md/AGENTS.md
    compliance, frontmatter fields, reference-inclusion modes, and portability — which
    no other persona in the manifest covers.
  keywords:
  - CLAUDE.md
  - AGENTS.md
  - frontmatter
  - YAML frontmatter
  - naming convention
  - cross-platform portability
  - standards compliance
  - backtick path
  - reference inclusion
  - skill compliance
  phrasing: Prompt looks project-standards-flavored. Consider `/ce-lite:ce-project-standards-reviewer`
