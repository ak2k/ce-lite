# Pass B overrides for skill-rules.json
#
# Format: one top-level key per persona (canonical name with ce- prefix).
# Each entry can provide `keywords` (list) and/or `phrasing` (string) to
# replace the Pass A defaults derived from the manifest description.
#
# Anything not listed here keeps Pass A's auto-derived rule, which is built
# from the persona's manifest description + name (see derive_keyword_rule
# in converter/generate_wrappers.py).
#
# Maintenance: populate / refine via `converter/refine-keyword-rules.py`
# (claude -p driven, run pre-release, output committed). Not a CI step —
# the "no LLM in CI" invariant holds.
#
# The six entries below are the legacy hand-curated rules that previously
# lived in DEFAULT_HOOK_RULES — preserved verbatim through this migration.

ce-security-sentinel:
  keywords:
    - security
    - vuln
    - vulnerab
    - OWASP
    - injection
    - XSS
    - CSRF
    - SSRF
    - "auth "
    - "auth-"
    - JWT
    - OAuth
    - mass assignment
    - sanitiz
    - hardcoded secret
    - credential leak
    - open redirect
    - deserialization
    - is this safe
    - paranoid review
    - is it safe to ship
    - before we ship
  phrasing: >
    The prompt looks security-flavored. Consider running
    `/ce-lite:ce-ask-security-sentinel` (or invoking the wrapper via Skill)
    for a focused security review by a specialist persona. The wrapper
    dispatches a sub-agent grounded in OWASP / injection / authn-authz /
    secrets-handling expertise.

ce-architecture-strategist:
  keywords:
    - factor out
    - extract method
    - extract class
    - duplicat
    - copy-pasted
    - DRY
    - coupling
    - abstraction
    - boundaries
    - structural refactor
    - service boundaries
    - module bound
    - pattern compliance
    - design integrity
  phrasing: >
    Architecture/design concerns visible. Consider
    `/ce-lite:ce-ask-architecture-strategist` for a structural review
    (pattern compliance, layer violations, naming consistency).

ce-code-simplicity-reviewer:
  keywords:
    - YAGNI
    - over-engineered
    - premature abstraction
    - redundant abstraction
    - simplify
    - simpler way
    - is this too clever
    - unnecessary indirection
    - feels overcomplicated
    - could this be simpler
  phrasing: >
    Simplicity concerns visible. Consider
    `/ce-lite:ce-ask-code-simplicity-reviewer` for a YAGNI/redundancy review.

ce-correctness-reviewer:
  keywords:
    - edge case
    - off-by-one
    - race condition
    - deadlock
    - concurrency bug
    - correctness
    - logic bug
    - is this correct
    - boundary condition
  phrasing: >
    Correctness concerns visible. Consider
    `/ce-lite:ce-ask-correctness-reviewer` for an edge-case /
    boundary-condition review.

ce-pattern-recognition-specialist:
  keywords:
    - naming consistency
    - convention drift
    - style consistency
    - naming pattern
    - matches existing
    - consistent with
    - follow the pattern
  phrasing: >
    Pattern/consistency review may help. Consider
    `/ce-lite:ce-ask-pattern-recognition-specialist` to surface duplication
    and convention drift.

ce-performance-oracle:
  keywords:
    - performance
    - latency
    - bottleneck
    - slow query
    - "N+1"
    - p99
    - throughput
    - memory pressure
  phrasing: >
    Performance angle visible. Consider
    `/ce-lite:ce-ask-performance-oracle` for a structured performance review.
