  - visual hierarchy
  - micro-interactions
  - font pairing
  - whitespace
  - hover states
  - gradient background
  - design iteration
  - visual polish
  - border-radius
  - redesign
  phrasing: Design refinement prompt detected. Consider `/ce-lite:ce-design-iterator`
