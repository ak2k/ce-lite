    '
ce-performance-reviewer:
  _rationale: Keywords target the exact runtime anti-patterns this persona hunts (N+1,
    hot-path allocations, unbounded queries, blocking I/O, cache eviction) using domain-specific
    phrases that are long enough to avoid greedy substring false positives and are
    not shared with security or other personas.
  keywords:
  - N+1 query
  - eager loading
  - query inside loop
  - missing LIMIT
  - blocking I/O
  - hot path
  - memoization
  - cache eviction
  - full table scan
  phrasing: Prompt looks performance-flavored. Consider `/ce-lite:ce-performance-reviewer`
    for expert review of N+1 queries, unbounded memory growth, missing pagination,
    and hot-path bottlenecks.
ce-pr-comment-resolver:
  _rationale: Keywords target GitHub PR thread-specific terminology (review thread,
    outdated thread, reply to reviewer) to fire on resolution workflows without overlapping
