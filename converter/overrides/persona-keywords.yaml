  - over-engineered
  - YAGNI
  - gold-plating
  - premature abstraction
  - complexity bloat
  - right-sized
  - unnecessary abstraction
  - scope alignment
  - implementation bloat
  phrasing: Scope/complexity-flavored planning review. Consider `/ce-lite:ce-scope-guardian-reviewer`
