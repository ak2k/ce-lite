  - repository pattern
  - dependency injection
  - anemic model
  - GraphQL
  - presenter
  - service layer
  - JWT
  - Hotwire
  - majestic monolith
  phrasing: The prompt looks Rails-architecture-flavored. Consider `/ce-lite:ce-dhh-rails-reviewer`
