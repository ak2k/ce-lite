# Pass B overrides for skill-rules.json
#
# Format: one top-level key per persona (canonical name with ce- prefix).
# Each entry can provide `keywords` (list) and/or `phrasing` (string) to
# replace the Pass A defaults derived from the manifest description.
# The `_rationale` field is for transcript review and is ignored at
# build time (see generate_wrappers.load_keyword_overrides).
#
# Anything not listed here keeps Pass A's auto-derived rule, which is
# built from the persona's manifest description + name (see
# derive_keyword_rule in converter/generate_wrappers.py).
#
# Maintenance: refine via `converter/refine-keyword-rules.py`
# (claude -p driven, run pre-release, output committed). Not a CI step —
# the 'no LLM in CI' invariant holds.
#
ce-adversarial-document-reviewer:
  _rationale: Keywords target document-type signals (RFC, ADR, PRD, design doc, technical
    spec) and adversarial-review actions (unstated assumptions) distinctive to high-stakes
    architectural and requirements artifacts where premise-challenging adds unique
    value over standard review.
  keywords:
  - RFC
  - ADR
  - PRD
  - design doc
  - architectural decision
  - requirements document
  - design proposal
  - technical spec
  - unstated assumptions
  - architecture proposal
  phrasing: High-stakes document prompt detected. Consider `/ce-lite:ce-adversarial-document-reviewer`
    for adversarial premise-challenging, assumption-surfacing, and decision stress-testing
    on architecture and requirements docs.
ce-adversarial-reviewer:
  _rationale: Captures both adversarial intent signals ("try to break", "failure scenario",
    "abuse case") and high-risk domain vocabulary ("billing", "payment flow", "backfill",
    "data migration", "webhook", "race condition"), without overlapping pattern-based
    security review personas.
  keywords:
  - race condition
  - failure scenario
  - try to break
  - data migration
  - payment flow
  - what could go wrong
  - backfill
  - billing
  - webhook
  - abuse case
  phrasing: High-risk diff or adversarial-review framing. Consider `/ce-lite:ce-adversarial-reviewer`
    for chaos-engineer review that constructs specific failure chains across auth,
    payments, data migrations, and external APIs.
ce-agent-native-reviewer:
  _rationale: 'Keywords target the agent-native parity domain exclusively: cross-referencing
    UI actions against agent tool definitions, coverage gaps, and runtime context
    injection — all distinctive to this persona.'
  keywords:
  - agent-native
  - action parity
  - context parity
  - tool parity
  - tool coverage
  - agent integration
  - tool definitions
  - UI actions
  - agent tools
  - dynamic context
  phrasing: Prompt looks agent-parity-flavored. Consider `/ce-lite:ce-agent-native-reviewer`
    for a focused audit of action/context parity between UI features and agent tools,
    including system-prompt completeness.
ce-ankane-readme-writer:
  _rationale: Keywords target the narrow intersection of Ruby gem packaging vocabulary
    and README documentation requests, minimizing false positives from general Ruby
    or general README/docs queries.
  keywords:
  - ankane
  - ruby gem readme
  - gem readme
  - gemspec
  - rubygems
  - gem documentation
  - imperative voice
  - gem version badge
  - write gem docs
  - ankane template
  phrasing: Gem README authoring detected. Consider `/ce-lite:ce-ankane-readme-writer`
    for Ankane-template READMEs with imperative voice, standard section ordering,
    and Ruby gem conventions.
ce-api-contract-reviewer:
  _rationale: Keywords target the precise vocabulary users employ when touching API
    contracts — version semantics, consumer impact, schema mutations — while deliberately
    excluding generic terms that would fire on unrelated reviews.
  keywords:
  - breaking change
  - backward compat
  - deprecation
  - response schema
  - semver
  - existing clients
  - wire format
  - field rename
  - OpenAPI
  phrasing: API contract flavor detected. Consider `/ce-lite:ce-api-contract-reviewer`
    for a specialist review of breaking changes, versioning gaps, and backward-compatibility
    impact on existing consumers.
ce-architecture-strategist:
  keywords:
  - factor out
  - extract method
  - extract class
  - duplicat
  - copy-pasted
  - DRY
  - coupling
  - abstraction
  - boundaries
  - structural refactor
  - service boundaries
  - module bound
  - pattern compliance
  - design integrity
  phrasing: 'Architecture/design concerns visible. Consider `/ce-lite:ce-ask-architecture-strategist`
    for a structural review (pattern compliance, layer violations, naming consistency).

    '
ce-best-practices-researcher:
  _rationale: This persona specializes in external research and synthesis of industry
    standards, making it the right fit when users ask about idiomatic patterns, community
    conventions, official documentation, or API deprecation status.
  keywords:
  - best practice
  - industry standard
  - community convention
  - idiomatic
  - deprecated
  - canonical
  - official documentation
  - recommended pattern
  - real-world example
  - framework convention
  phrasing: Looks like a standards/conventions question. Consider `/ce-lite:ce-best-practices-researcher`
    for synthesizing authoritative docs, community conventions, and idiomatic patterns
    — with deprecation checks included.
ce-code-simplicity-reviewer:
  keywords:
  - YAGNI
  - over-engineered
  - premature abstraction
  - redundant abstraction
  - simplify
  - simpler way
  - is this too clever
  - unnecessary indirection
  - feels overcomplicated
  - could this be simpler
  phrasing: 'Simplicity concerns visible. Consider `/ce-lite:ce-ask-code-simplicity-reviewer`
    for a YAGNI/redundancy review.

    '
ce-coherence-reviewer:
  _rationale: Keywords target the narrow slice of prompts about self-contradicting
    documents and drifting terminology — distinct from feasibility, completeness,
    or security review — anchored by phrases that only arise when a user suspects
    a document disagrees with itself.
  keywords:
  - terminology drift
  - internal consistency
  - section contradicts
  - contradicts itself
  - inconsistencies
  - forward reference
  - planning document
  - coherence review
  - requirements document
  phrasing: 'Prompt looks document-coherence-flavored. Consider `/ce-lite:ce-coherence-reviewer`
    for internal-consistency review: contradictions between sections, terminology
    drift, broken references, and genuine ambiguity.'
ce-correctness-reviewer:
  keywords:
  - edge case
  - off-by-one
  - race condition
  - deadlock
  - concurrency bug
  - correctness
  - logic bug
  - is this correct
  - boundary condition
  phrasing: 'Correctness concerns visible. Consider `/ce-lite:ce-ask-correctness-reviewer`
    for an edge-case / boundary-condition review.

    '
ce-data-integrity-guardian:
  _rationale: Database migration and data-integrity mistakes have catastrophic blast
    radius in production; these high-precision, domain-specific terms filter precisely
    for the scenarios this persona was built to catch.
  keywords:
  - foreign key
  - cascade delete
  - referential integrity
  - deadlock
  - NOT NULL
  - zero-downtime migration
  - backfill
  - table lock
  - idempotent migration
  - right to erasure
  phrasing: The prompt looks database or migration-flavored. Consider `/ce-lite:ce-data-integrity-guardian`
    for migration safety, constraint validation, transaction boundaries, and data-privacy
    compliance.
ce-data-migration-expert:
  _rationale: These terms are tightly scoped to database migration operations—backfills,
    DDL changes, enum remapping, dual-write patterns—where silent data corruption
    is the primary risk, making a specialist review distinctly valuable.
  keywords:
  - backfill
  - data migration
  - column rename
  - enum conversion
  - dual-write
  - id mapping
  - ALTER TABLE
  - idempotent
  - schema change
  phrasing: Migration-flavored prompt detected. Consider `/ce-lite:ce-data-migration-expert`
    for validating backfills, ID mappings, enum conversions, and schema changes against
    production data reality.
ce-data-migrations-reviewer:
  _rationale: These terms strongly signal database migration work where deployment-window
    hazards — swapped enum mappings, missing backfills, unsafe column drops, and broken
    dual-write transitions — require a specialist rather than a generic code reviewer.
  keywords:
  - backfill
  - migration
  - dual-write
  - NOT NULL
  - enum mapping
  - column drop
  - schema change
  - concurrent index
  - data backfill
  - rollback plan
  phrasing: Schema-change / migration flavor. Consider `/ce-lite:ce-data-migrations-reviewer`
    for a specialist review of rollback safety, dual-write windows, NOT NULL backfills,
    and swapped enum mappings.
ce-deployment-verification-agent:
  _rationale: Keywords anchor on the concrete artifacts this persona uniquely produces—backfill
    operations, rollback plans, Go/No-Go gates, data invariants, and SQL verification
    queries—rather than generic deployment vocabulary, keeping false-positive rates
    low.
  keywords:
  - backfill
  - rollback plan
  - go/no-go
  - production migration
  - deployment checklist
  - data invariant
  - SQL verification
  - irreversible
  phrasing: Prompt looks like a risky data deployment. Consider `/ce-lite:ce-deployment-verification-agent`
    for Go/No-Go checklists, SQL verification queries, rollback procedures, and post-deploy
    monitoring plans.
ce-design-implementation-reviewer:
  _rationale: This persona specializes in systematically comparing live UI implementations
