    '
ce-performance-oracle:
  keywords:
  - performance
  - latency
  - bottleneck
  - slow query
  - N+1
  - p99
  - throughput
  - memory pressure
  phrasing: 'Performance angle visible. Consider `/ce-lite:ce-ask-performance-oracle`
