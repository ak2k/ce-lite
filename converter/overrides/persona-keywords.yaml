ce-product-lens-reviewer:
  _rationale: This persona targets the "building the wrong thing well" failure mode,
    so it should fire on prompts about PRDs, roadmaps, and planning docs where strategic
    premise, prioritization coherence, and goal-work alignment are the core risks.
  keywords:
  - product requirements
  - planning document
  - opportunity cost
  - goal alignment
  - PRD
  - premise
  - prioritization
  - build vs buy
  - requirements document
  - product roadmap
  phrasing: Prompt looks product-strategy-flavored. Consider `/ce-lite:ce-ask-product-lens-reviewer`
