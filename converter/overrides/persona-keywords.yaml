  keywords:
  - git blame
  - git bisect
  - code archaeology
  - commit history
  - who wrote
  - who changed
  - when was introduced
  - file evolution
  phrasing: Prompt looks git-archaeology-flavored. Consider `/ce-lite:ce-git-history-analyzer`
    for tracing code evolution, blame/bisect analysis, and contributor mapping to
    explain why code exists in its current form.
ce-issue-intelligence-analyst:
  _rationale: Keywords target the distinctive vocabulary of cross-issue synthesis
    (themes, clustering, landscape, triage) rather than generic bug-fixing language,
    ensuring the hook fires on prompts about issue intelligence rather than individual
    defect work.
  keywords:
  - GitHub issues
  - issue tracker
  - recurring themes
  - bug patterns
  - issue landscape
  - pain patterns
  - severity trends
  - issue triage
  - issue clustering
  - user complaints
  phrasing: Issue-analysis flavor detected. Consider `/ce-lite:ce-issue-intelligence-analyst`
    for surfacing recurring themes, pain patterns, and severity trends across your
    GitHub issue tracker.
ce-julik-frontend-races-reviewer:
  _rationale: This persona targets frontend timing bugs—stale timers, duplicate async
    work, lifecycle cleanup gaps, and DOM mutation after disconnect—that generic reviewers
    routinely miss in Turbo/Stimulus/React diffs.
  keywords:
  - race condition
  - setInterval
  - stale timer
  - event listener leak
  - lifecycle cleanup
  - AbortController
  - unhandled rejection
  - stimulus controller
  - turbo frame
  - removeEventListener
  phrasing: Async/lifecycle-flavored prompt. Consider `/ce-lite:ce-julik-frontend-races-reviewer`
    for race conditions, stale timers, and lifecycle cleanup in Turbo/Stimulus/async
    UI code.
ce-kieran-python-reviewer:
  _rationale: Keywords target exact Python idioms, type-system constructs, and anti-patterns
    Kieran hunts (missing annotations, exception swallowing, un-Pythonic structure),
    minimizing false fires from generic prompts.
  keywords:
  - pythonic
  - type hint
  - type annotation
  - TypedDict
  - dataclass
  - pydantic
  - context manager
  - bare except
  - except pass
  phrasing: 'Prompt looks Python-quality-flavored. Consider `/ce-lite:ce-kieran-python-reviewer`
    for strict Pythonic review: type hints, structure, and exception-handling quality.'
ce-kieran-rails-reviewer:
  _rationale: Keywords target Rails-exclusive vocabulary (Turbo, Hotwire, before_action,
    strong parameters, ActiveRecord callbacks) that signal the user is working on
    a Rails diff matching Kieran's specialist review scope.
  keywords:
  - turbo stream
  - Hotwire
  - service object
  - controller action
  - ActiveRecord
  - before_action
  - strong parameters
  - rails callback
  - stimulus controller
  phrasing: Rails-flavored diff detected. Consider `/ce-lite:ce-kieran-rails-reviewer`
    for a strict Rails review covering controller clarity, Turbo/Hotwire patterns,
    service object extraction, and regression hunting.
ce-kieran-typescript-reviewer:
  _rationale: Keywords target TypeScript-specific constructs (suppression directives,
    cast patterns, union narrowing) that signal the user needs Kieran's high-bar type-safety
    and structural-clarity review rather than a generic code reviewer.
  keywords:
  - TypeScript
  - type safety
  - as any
  - '@ts-ignore'
  - discriminated union
  - type assertion
  - nullable
  - type narrowing
  - ts-expect-error
  - unknown as
  phrasing: 'TypeScript-flavored prompt detected. Consider `/ce-lite:ce-kieran-typescript-reviewer`
    for strict type-safety review: `any` usage, unsafe casts, nullable flows, and
    discriminated-union exhaustiveness.'
ce-learnings-researcher:
  _rationale: This persona specializes in searching docs/solutions/ via frontmatter
    metadata for past learnings, conventions, and prior decisions—preventing the team
    from re-discovering what is already documented.
  keywords:
  - docs/solutions
  - past learnings
  - institutional knowledge
  - prior learnings
  - frontmatter
  - team conventions
  - existing learnings
  - knowledge base
  - solutions directory
  phrasing: Prompt references past learnings or institutional knowledge. Consider
    `/ce-lite:ce-learnings-researcher` for searching docs/solutions/ frontmatter to
    surface applicable team knowledge before work starts.
ce-maintainability-reviewer:
  _rationale: Keywords target the five structural smell categories the persona hunts
    (premature abstraction, indirection, dead code, coupling, naming); all are multi-word
    phrases or long domain terms that won't collide with security/performance personas.
  keywords:
  - premature abstraction
  - circular dependency
  - unnecessary indirection
  - dead code
  - over-engineered
  - tight coupling
  - wrapper class
  - unused exports
  - naming obscures
  - unreachable branch
  phrasing: Prompt looks maintainability-flavored. Consider `/ce-lite:ce-maintainability-reviewer`
    for a focused review targeting premature abstraction, dead code, unnecessary indirection,
    module coupling, and intent-obscuring names.
ce-pattern-recognition-specialist:
  keywords:
